<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>115年度全國語文競賽－臺東縣分區賽</title>
<script src="https://js.puter.com/v2/"></script>

<style>
body { font-family: "Microsoft JhengHei"; background:#f1f5f9; display:flex; justify-content:center; align-items:center; height:100vh; margin:0;}
.container { background:#fff; padding:25px; border-radius:20px; width:90%; max-width:460px; text-align:center; box-shadow:0 10px 25px rgba(0,0,0,0.1);}
.grid { display:grid; grid-template-columns:1fr 1fr; gap:10px;}
.school-btn { padding:18px; border:none; border-radius:10px; background:#3b82f6; color:#fff; font-weight:bold; cursor:pointer;}
.school-btn:hover { background:#2563eb;}
#msg { margin-top:15px; padding:10px; border-radius:8px; display:none;}
.loading-msg { background:#dbeafe; color:#1e40af;}
.error-msg { background:#fee2e2; color:#b91c1c;}
.auth-status { margin-bottom:15px; font-size:0.9rem;}
</style>
</head>

<body>
<div class="container">

<div id="authPanel" class="auth-status" style="display:none;">
目前帳號：<span id="email"></span><br><br>
<button onclick="hardLogout()">登出</button>
</div>

<h2>語文競賽成績系統</h2>

<div id="msg"></div>

<div class="grid">
<button class="school-btn" onclick="requestAccess('三和國小')">三和國小</button>
<button class="school-btn" onclick="requestAccess('大坡國小')">大坡國小</button>
<button class="school-btn" onclick="requestAccess('成功國小')">成功國小</button>
<button class="school-btn" onclick="requestAccess('尚武國小')">尚武國小</button>
<button class="school-btn" onclick="requestAccess('岩灣國小')">岩灣國小</button>
<button class="school-btn" onclick="requestAccess('朗島國小')">朗島國小</button>
<button class="school-btn" onclick="requestAccess('鹿野國小')">鹿野國小</button>
<button class="school-btn" onclick="requestAccess('綠島國小')">綠島國小</button>
<button class="school-btn" onclick="requestAccess('豐年國小')">豐年國小</button>
</div>

</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbxkjmHEZ7lI_BXX8p36RKegaUkzWPEjVyMaSl-X-EBhrHeUdf3_KD43F8QMm0DvJBF3AA/exec";

/* ✅ 安全登入函式（核心） */
async function safeLogin(retry = 2) {
    for (let i = 0; i < retry; i++) {
        if (!puter.auth.isSignedIn()) {
            await puter.auth.signIn();
        }

        const user = await puter.auth.getUser();

        if (user && user.email) return user;

        // email 遺失 → 強制重來
        await puter.auth.signOut();
    }
    return null;
}

/* 主流程 */
async function requestAccess(school) {
    showMsg("登入驗證中...", "loading-msg");

    try {
        const user = await safeLogin();

        if (!user) {
            showMsg("登入失敗，請重新操作並允許 Email 權限", "error-msg");
            return;
        }

        updateUI(user.email);

        // 加入 timeout 防卡死
        const controller = new AbortController();
        setTimeout(() => controller.abort(), 10000);

        const res = await fetch(GAS_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                email: user.email,
                unit: school
            }),
            signal: controller.signal
        });

        const data = await res.json();

        if (data.status === "success") {
            showMsg("驗證成功，開啟中...", "loading-msg");
            window.open(data.url, "_blank");
        } else {
            showMsg(data.message, "error-msg");
        }

    } catch (err) {
        console.error(err);
        showMsg("系統錯誤或連線失敗", "error-msg");
    }
}

/* UI */
function updateUI(email){
    document.getElementById("authPanel").style.display="block";
    document.getElementById("email").innerText=email;
}

function showMsg(txt, cls){
    const m=document.getElementById("msg");
    m.style.display="block";
    m.className=cls;
    m.innerText=txt;
}

async function hardLogout(){
    await puter.auth.signOut();
    localStorage.clear();
    sessionStorage.clear();
    location.reload();
}

/* 初始化 */
puter.ui.onReady(async ()=>{
    if(puter.auth.isSignedIn()){
        const user = await puter.auth.getUser();
        if(user && user.email){
            updateUI(user.email);
        }
    }
});
</script>

</body>
</html>
