<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>115年度全國語文競賽－臺東縣分區賽</title>
    <script src="https://js.puter.com/v2/"></script>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #f3f4f6; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: white; padding: 2.5rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 480px; text-align: center; }
        
        .auth-status { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 12px; padding: 15px; margin-bottom: 25px; font-size: 0.9rem; color: #4b5563; }
        .btn-reset { background: #ef4444; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 8px; font-size: 0.75rem; }

        h1 { color: #111827; font-size: 1.4rem; margin: 0 0 20px 0; border-bottom: 4px solid #2563eb; padding-bottom: 12px; line-height: 1.4; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .school-btn { 
            padding: 20px 5px; border: none; border-radius: 10px; 
            background-color: #2563eb; color: white; font-size: 1rem; 
            cursor: pointer; transition: 0.2s; font-weight: bold;
        }
        .school-btn:hover { background-color: #1d4ed8; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(37, 99, 235, 0.3); }

        #msg { margin-top: 20px; padding: 12px; border-radius: 8px; font-weight: bold; display: none; }
        .info { background: #eff6ff; color: #1e40af; }
        .error { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }

        .important { margin-top: 25px; font-size: 0.8rem; color: #b91c1c; background: #fff1f2; padding: 12px; border-radius: 10px; border: 1px solid #fecdd3; }
    </style>
</head>
<body>

<div class="container">
    <div id="authPanel" class="auth-status" style="display:none;">
        目前帳號：<b id="userEmail">檢查中...</b><br>
        <button class="btn-reset" onclick="hardLogout()">登出並切換帳號 (解決授權問題)</button>
    </div>

    <h1>115年度全國語文競賽<br>臺東縣分區賽成績系統</h1>
    
    <div id="msg"></div>

    <div class="grid">
        <button class="school-btn" onclick="goToSheet('三和國小')">三和國小</button>
        <button class="school-btn" onclick="goToSheet('大坡國小')">大坡國小</button>
        <button class="school-btn" onclick="goToSheet('成功國小')">成功國小</button>
        <button class="school-btn" onclick="goToSheet('尚武國小')">尚武國小</button>
        <button class="school-btn" onclick="goToSheet('岩灣國小')">岩灣國小</button>
        <button class="school-btn" onclick="goToSheet('朗島國小')">朗島國小</button>
        <button class="school-btn" onclick="goToSheet('鹿野國小')">鹿野國小</button>
        <button class="school-btn" onclick="goToSheet('綠島國小')">綠島國小</button>
        <button class="school-btn" onclick="goToSheet('豐年國小')">豐年國小</button>
    </div>

    <div class="important">
        <b>💡 登入提示：</b><br>
        若系統提示「無法獲取 Email」，請點擊上方<b>紅色按鈕</b>重新登入，並務必在 Google 視窗勾選「查看電子郵件地址」。
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxkjmHEZ7lI_BXX8p36RKegaUkzWPEjVyMaSl-X-EBhrHeUdf3_KD43F8QMm0DvJBF3AA/exec";

    async function goToSheet(unit) {
        const msg = document.getElementById('msg');
        msg.style.display = "block";
        msg.innerText = "驗證身分中...";
        msg.className = "info";

        try {
            // 1. 確保已登入
            if (!puter.auth.isSignedIn()) {
                await puter.auth.signIn();
            }

            let user = await puter.auth.getUser();

            // 2. 自動修正機制：如果登入後沒拿到 Email (常見於未勾選權限)
            if (!user || !user.email) {
                console.warn("Email 缺失，自動強制登出重試...");
                await puter.auth.signOut();
                alert("【重要授權提示】\n請點擊確定後重新登入，並在 Google 畫面中務必勾選「查看您的主要電子郵件地址」。");
                await puter.auth.signIn();
                user = await puter.auth.getUser();
            }

            if (!user || !user.email) {
                msg.innerText = "授權失敗：無法獲取您的 Email 地址。";
                msg.className = "error";
                return;
            }

            updateUI(user.email);

            // 3. 呼叫 GAS 獲取網址
            const response = await fetch(GAS_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ email: user.email, unit: unit })
            });

            const result = await response.json();

            if (result.status === "success") {
                msg.style.display = "none";
                window.open(result.url, '_blank');
            } else {
                msg.innerText = result.message;
                msg.className = "error";
            }

        } catch (e) {
            msg.innerText = "網路連線失敗。";
            msg.className = "error";
        }
    }

    async function hardLogout() {
        await puter.auth.signOut();
        localStorage.clear();
        location.reload();
    }

    function updateUI(email) {
        document.getElementById('authPanel').style.display = "block";
        document.getElementById('userEmail').innerText = email;
    }

    puter.ui.onReady(async () => {
        if (puter.auth.isSignedIn()) {
            const user = await puter.auth.getUser();
            if (user && user.email) updateUI(user.email);
        }
    });
</script>

</body>
</html>
