<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>115年度全國語文競賽－臺東縣分區賽</title>
    <script src="https://js.puter.com/v2/"></script>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #f1f5f9; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 460px; text-align: center; }
        
        /* 帳號面板 */
        .auth-status { 
            background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 15px; margin-bottom: 25px; 
            font-size: 0.9rem; color: #475569; display: flex; flex-direction: column; gap: 10px;
        }
        .user-email { font-weight: bold; color: #1e293b; word-break: break-all; }
        .btn-action { background: #64748b; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-action:hover { background: #334155; }
        .btn-danger { background: #ef4444; }
        .btn-danger:hover { background: #dc2626; }

        h1 { color: #1e293b; font-size: 1.4rem; margin: 0 0 20px 0; border-bottom: 4px solid #3b82f6; padding-bottom: 15px; line-height: 1.4; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .school-btn { 
            padding: 20px 5px; border: none; border-radius: 10px; 
            background-color: #3b82f6; color: white; font-size: 1.05rem; 
            cursor: pointer; transition: 0.2s; font-weight: bold;
        }
        .school-btn:hover { background-color: #2563eb; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(59, 130, 246, 0.4); }

        #msg { padding: 15px; border-radius: 8px; margin-top: 15px; display: none; font-weight: bold; font-size: 0.9rem; border: 1px solid transparent; }
        .loading-msg { background: #dbeafe; color: #1e40af; border-color: #bfdbfe; }
        .error-msg { background: #fee2e2; color: #b91c1c; border-color: #fca5a5; }

        .hint-box { margin-top: 25px; font-size: 0.8rem; color: #64748b; background: #fffbeb; padding: 15px; border-radius: 10px; border: 1px solid #fef3c7; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <!-- 帳號與登出面板 -->
    <div id="authPanel" class="auth-status" style="display:none;">
        <div>登入中：<span id="displayEmail" class="user-email">讀取中...</span></div>
        <div style="display: flex; gap: 10px; justify-content: center;">
            <button class="btn-action btn-danger" onclick="hardLogout()">登出並清除緩存</button>
            <button class="btn-action" onclick="switchAccount()">切換其他帳號</button>
        </div>
    </div>

    <h1>115年度全國語文競賽<br>臺東縣分區賽成績系統</h1>
    
    <div id="msg"></div>

    <div class="grid">
        <button class="school-btn" onclick="requestAccess('三和國小')">三和國小</button>
        <button class="school-btn" onclick="requestAccess('大坡國小')">大坡國小</button>
        <button class="school-btn" onclick="requestAccess('成功國小')">成功國小</button>
        <button class="school-btn" onclick="requestAccess('尚武國小')">尚武國小</button>
        <button class="school-btn" onclick="requestAccess('岩灣國小')">岩灣國小</button>
        <button class="school-btn" onclick="requestAccess('朗島國小')">朗島國小</button>
        <button class="school-btn" onclick="requestAccess('鹿野國小')">鹿野國小</button>
        <button class="school-btn" onclick="requestAccess('綠島國小')">綠島國小</button>
        <button class="school-btn" onclick="requestAccess('豐年國小')">豐年國小</button>
    </div>

    <div class="hint-box" id="guideBox">
        <b>💡 無法讀取 Email 的解決方法：</b><br>
        1. 點擊上方的<b>「登出並清除緩存」</b>。<br>
        2. 重新點擊學校，在 Google 授權視窗中，請<b>務必勾選</b>「查看您的主要電子郵件地址」方塊。
    </div>
</div>

<script>
    // ！！！請將下方網址替換為您 GAS 部署後的最新網址 ！！！
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxkjmHEZ7lI_BXX8p36RKegaUkzWPEjVyMaSl-X-EBhrHeUdf3_KD43F8QMm0DvJBF3AA/exec";

    async function requestAccess(school) {
        showMsg("正在檢查身分...", "loading-msg");

        try {
            // 1. 確認登入狀態
            if (!puter.auth.isSignedIn()) {
                await puter.auth.signIn();
            }

            let user = await puter.auth.getUser();

            // 2. 核心修正：如果登入但沒有 email，強制登出並清除，然後重新彈出登入
            if (!user || !user.email) {
                console.warn("偵測到 Email 缺失，自動重置連線...");
                await puter.auth.signOut();
                alert("權限驗證不完整。請重新登入 Google，並務必在授權畫面勾選「查看您的主要電子郵件地址」。");
                await puter.auth.signIn();
                user = await puter.auth.getUser();
            }

            // 最終檢查
            if (!user || !user.email) {
                showMsg("授權失敗。請點擊「登出並清除緩存」後重試。", "error-msg");
                return;
            }

            updatePanel(user.email);

            // 3. 呼叫 GAS
            const response = await fetch(GAS_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ email: user.email, unit: school })
            });

            const result = await response.json();

            if (result.status === "success") {
                window.open(result.url, '_blank');
                showMsg("驗證成功，已為您開啟試算表。", "loading-msg");
            } else {
                showMsg(result.message, "error-msg");
            }

        } catch (e) {
            showMsg("系統連線異常，請檢查 GAS 網址是否正確。", "error-msg");
            console.error(e);
        }
    }

    /**
     * 強制登出並清除所有瀏覽器快取
     */
    async function hardLogout() {
        await puter.auth.signOut();
        localStorage.clear();
        sessionStorage.clear();
        location.reload();
    }

    /**
     * 切換帳號 (單純登出再整理)
     */
    async function switchAccount() {
        await puter.auth.signOut();
        location.reload();
    }

    function updatePanel(email) {
        document.getElementById('authPanel').style.display = "block";
        document.getElementById('displayEmail').innerText = email;
        document.getElementById('guideBox').style.display = "none";
    }

    function showMsg(txt, className) {
        const m = document.getElementById('msg');
        m.style.display = "block";
        m.innerText = txt;
        m.className = className;
    }

    // 初始化自動檢查
    puter.ui.onReady(async () => {
        if (puter.auth.isSignedIn()) {
            const user = await puter.auth.getUser();
            if (user && user.email) {
                updatePanel(user.email);
            }
        }
    });
</script>

</body>
</html>
