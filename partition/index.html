<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>115年度全國語文競賽－臺東縣分區賽</title>
    <script src="https://js.puter.com/v2/"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --danger: #e74c3c; --success: #27ae60; }
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #f0f2f5; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); width: 90%; max-width: 550px; text-align: center; }
        h1 { color: var(--primary); font-size: 1.5rem; margin-top: 0; margin-bottom: 25px; line-height: 1.4; }
        
        .status-bar { background: #f8f9fa; padding: 12px 20px; border-radius: 10px; font-size: 0.9rem; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #ddd; }
        .logout-btn { background: var(--danger); color: white; border: none; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; font-weight: bold; transition: 0.2s; }
        .logout-btn:hover { opacity: 0.8; }

        .unit-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .school-btn { padding: 20px 5px; background: white; border: 2px solid var(--accent); color: var(--accent); border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 1rem; }
        .school-btn:hover { background: var(--accent); color: white; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(52, 152, 219, 0.3); }

        #display-msg { margin-top: 25px; padding: 15px; border-radius: 8px; font-weight: bold; min-height: 24px; font-size: 1rem; white-space: pre-wrap; display: none; }
        .err-msg { display: block !important; color: var(--danger); background: #fff5f5; border: 1px solid var(--danger); }
        .ok-msg { display: block !important; color: var(--success); background: #f0fff4; border: 1px solid var(--success); }

        .loader { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(255,255,255,0.9); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .spinner { width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader" class="loader">
    <div class="spinner"></div>
    <b style="color: var(--primary);">正在準備 Google 驗證視窗...</b>
    <p style="font-size: 0.8rem; color: #666;">(若無反應，請檢查瀏覽器是否攔截了彈出視窗)</p>
</div>

<div class="container">
    <h1>115年度全國語文競賽<br>臺東縣分區賽成績系統</h1>

    <div class="status-bar">
        <span id="current-user">尚未登入</span>
        <button class="logout-btn" onclick="manualLogout()">登出帳號</button>
    </div>

    <div class="unit-grid">
        <button class="school-btn" onclick="processAuth('三和國小')">三和國小</button>
        <button class="school-btn" onclick="processAuth('大坡國小')">大坡國小</button>
        <button class="school-btn" onclick="processAuth('成功國小')">成功國小</button>
        <button class="school-btn" onclick="processAuth('尚武國小')">尚武國小</button>
        <button class="school-btn" onclick="processAuth('岩灣國小')">岩灣國小</button>
        <button class="school-btn" onclick="processAuth('朗島國小')">朗島國小</button>
        <button class="school-btn" onclick="processAuth('鹿野國小')">鹿野國小</button>
        <button class="school-btn" onclick="processAuth('綠島國小')">綠島國小</button>
        <button class="school-btn" onclick="processAuth('豐年國小')">豐年國小</button>
    </div>

    <div id="display-msg"></div>
</div>

<script>
    // ⚠️ 請在此處填入您的 GAS 部署網址
    const GAS_ENDPOINT = "https://script.google.com/macros/s/AKfycbxkjmHEZ7lI_BXX8p36RKegaUkzWPEjVyMaSl-X-EBhrHeUdf3_KD43F8QMm0DvJBF3AA/exec"; 

    // 小助手：延遲函式
    const sleep = (ms) => new Promise(res => setTimeout(res, ms));

    async function updateUI() {
        const userLabel = document.getElementById('current-user');
        if (puter.auth.isSignedIn()) {
            const user = await puter.auth.getUser();
            userLabel.innerText = "目前帳號: " + user.email;
        } else {
            userLabel.innerText = "尚未登入";
        }
    }

    async function manualLogout() {
        await puter.auth.signOut();
        updateUI();
        notify("帳號已登出", "ok-msg");
    }

    async function processAuth(schoolName) {
        const msgArea = document.getElementById('display-msg');
        const loadingOverlay = document.getElementById('loader');
        
        msgArea.className = "";
        msgArea.innerText = "";
        loadingOverlay.style.display = "flex";

        try {
            // 強制每次點擊都重新開啟登入視窗：先登出 -> 延遲 -> 再登入
            if (puter.auth.isSignedIn()) {
                await puter.auth.signOut();
                await sleep(500); // 延遲 0.5 秒確保快取清除
            }
            
            // 呼叫 Google 帳號選擇器
            const user = await puter.auth.signIn();
            
            if (!user || !user.email) {
                throw new Error("使用者取消登入或未選擇帳號");
            }

            updateUI();
            notify("系統驗證中，請稍候...", "ok-msg");

            // 與 GAS 後端通訊
            const response = await fetch(GAS_ENDPOINT, {
                method: 'POST',
                mode: 'cors',
                body: JSON.stringify({
                    email: user.email,
                    targetUnit: schoolName
                })
            });

            if (!response.ok) throw new Error("後端伺服器通訊失敗");

            const data = await response.json();

            if (data.status === "success") {
                notify("驗證通過！正在為您開啟試算表...", "ok-msg");
                // 延遲一下讓使用者看見成功訊息再跳轉
                setTimeout(() => window.open(data.url, '_blank'), 1000);
            } else {
                notify(data.message, "err-msg");
            }

        } catch (error) {
            console.error(error);
            notify("發生錯誤：\n" + (error.message || "未知原因"), "err-msg");
        } finally {
            loadingOverlay.style.display = "none";
        }
    }

    function notify(text, className) {
        const msgArea = document.getElementById('display-msg');
        msgArea.innerText = text;
        msgArea.className = className;
    }

    // 啟動時檢查狀態
    updateUI();
</script>

</body>
</html>
