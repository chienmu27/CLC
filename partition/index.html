<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>115年度全國語文競賽－臺東縣分區賽</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 30px;
            border-bottom: 3px solid #3498db;
            padding-bottom: 10px;
        }
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            max-width: 800px;
            width: 100%;
        }
        .school-btn {
            background-color: #ffffff;
            border: 2px solid #3498db;
            color: #3498db;
            padding: 15px 20px;
            font-size: 18px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
            text-align: center;
            font-weight: bold;
            text-decoration: none;
        }
        .school-btn:hover {
            background-color: #3498db;
            color: white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .footer {
            margin-top: 40px;
            font-size: 14px;
            color: #7f8c8d;
        }
    </style>
</head>
<body>

    <h1>115年度全國語文競賽－臺東縣分區賽</h1>

    <div class="container">
        <!-- 9 個單位按鈕 -->
        <button class="school-btn" onclick="goToVerify('三和國小')">三和國小</button>
        <button class="school-btn" onclick="goToVerify('大坡國小')">大坡國小</button>
        <button class="school-btn" onclick="goToVerify('成功國小')">成功國小</button>
        <button class="school-btn" onclick="goToVerify('尚武國小')">尚武國小</button>
        <button class="school-btn" onclick="goToVerify('岩灣國小')">岩灣國小</button>
        <button class="school-btn" onclick="goToVerify('朗島國小')">朗島國小</button>
        <button class="school-btn" onclick="goToVerify('鹿野國小')">鹿野國小</button>
        <button class="school-btn" onclick="goToVerify('綠島國小')">綠島國小</button>
        <button class="school-btn" onclick="goToVerify('豐年國小')">豐年國小</button>
    </div>

    <div class="footer">
        請使用指定的 Google 帳號登入以進入系統
    </div>

    <script>
        // 請將下方的 URL 替換為您在 GAS 部署後取得的「網頁應用程式 URL」
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxkjmHEZ7lI_BXX8p36RKegaUkzWPEjVyMaSl-X-EBhrHeUdf3_KD43F8QMm0DvJBF3AA/exec";

        function goToVerify(schoolName) {
            // 帶參數跳轉到 GAS 進行驗證
            const target = GAS_WEB_APP_URL + "?school=" + encodeURIComponent(schoolName);
            window.location.href = target;
        }
    </script>
</body>
</html>
