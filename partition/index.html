<script>
    const GAS_ENDPOINT = "https://script.google.com/macros/s/AKfycbxkjmHEZ7lI_BXX8p36RKegaUkzWPEjVyMaSl-X-EBhrHeUdf3_KD43F8QMm0DvJBF3AA/exec"; 

    const sleep = (ms) => new Promise(res => setTimeout(res, ms));

    async function updateUI() {
        const userLabel = document.getElementById('current-user');
        if (puter.auth.isSignedIn()) {
            const user = await puter.auth.getUser();
            userLabel.innerText = "目前帳號: " + user.email;
        } else {
            userLabel.innerText = "尚未登入";
        }
    }

    async function manualLogout() {
        await puter.auth.signOut();
        updateUI();
        notify("帳號已登出", "ok-msg");
    }

    async function processAuth(schoolName) {
        const msgArea = document.getElementById('display-msg');
        const loadingOverlay = document.getElementById('loader');
        
        msgArea.className = "";
        msgArea.innerText = "";
        loadingOverlay.style.display = "flex";

        try {
            let user;

            // ✅ 修正：如果已登入 → 直接使用
            if (puter.auth.isSignedIn()) {
                user = await puter.auth.getUser();
            } else {
                user = await puter.auth.signIn();
            }

            if (!user || !user.email) {
                throw new Error("使用者取消登入或未選擇帳號");
            }

            updateUI();
            notify("系統驗證中，請稍候...", "ok-msg");

            const response = await fetch(GAS_ENDPOINT, {
                method: 'POST',
                mode: 'cors',
                body: JSON.stringify({
                    email: user.email,
                    targetUnit: schoolName
                })
            });

            if (!response.ok) throw new Error("後端伺服器通訊失敗");

            const data = await response.json();

            if (data.status === "success") {
                notify("驗證通過！正在為您開啟試算表...", "ok-msg");
                setTimeout(() => window.open(data.url, '_blank'), 1000);
            } else {
                notify(data.message, "err-msg");
            }

        } catch (error) {
            console.error(error);
            notify("發生錯誤：\n" + (error.message || "未知原因"), "err-msg");
        } finally {
            loadingOverlay.style.display = "none";
        }
    }

    function notify(text, className) {
        const msgArea = document.getElementById('display-msg');
        msgArea.innerText = text;
        msgArea.className = className;
    }

    updateUI();
</script>
