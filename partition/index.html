<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>115年度全國語文競賽－臺東縣分區賽</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #f0f2f5; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 90%; max-width: 500px; text-align: center; }
        h1 { color: #1a73e8; font-size: 1.5rem; margin-bottom: 1.5rem; }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 20px; }
        button { padding: 12px 8px; border: 1px solid #dadce0; background: white; border-radius: 8px; cursor: pointer; transition: 0.3s; font-size: 0.95rem; }
        button:hover { background-color: #f8f9fa; border-color: #1a73e8; color: #1a73e8; }
        #login-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(255,255,255,0.9); z-index: 100; flex-direction: column; align-items: center; justify-content: center; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 2s linear infinite; margin-bottom: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <h1>115年度全國語文競賽－臺東縣分區賽</h1>
    <p>請選擇您的所屬學校進行登入：</p>
    <div class="grid" id="button-grid">
        <!-- 學校按鈕由 JS 生成 -->
    </div>
</div>

<!-- 模擬圖片中的登入選擇器遮罩 -->
<div id="login-overlay">
    <div class="loader"></div>
    <p id="status-text">正在開啟 Google 驗證...</p>
    <div id="g_id_onload"
         data-client_id="YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com"
         data-callback="handleCredentialResponse"
         data-auto_prompt="false">
    </div>
</div>

<script>
    // --- 配置區 ---
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxkjmHEZ7lI_BXX8p36RKegaUkzWPEjVyMaSl-X-EBhrHeUdf3_KD43F8QMm0DvJBF3AA/exec"; // 貼上剛才部署得到的網址
    const CLIENT_ID = "您的_GOOGLE_OAUTH_CLIENT_ID"; // 需在 Google Cloud Console 申請
    const schools = ["三和國小", "大坡國小", "成功國小", "尚武國小", "岩灣國小", "朗島國小", "鹿野國小", "綠島國小", "豐年國小"];
    
    let selectedUnit = "";

    // 初始化按鈕
    const grid = document.getElementById('button-grid');
    schools.forEach(name => {
        const btn = document.createElement('button');
        btn.innerText = name;
        btn.onclick = () => startLogin(name);
        grid.appendChild(btn);
    });

    function startLogin(unit) {
        selectedUnit = unit;
        document.getElementById('login-overlay').style.display = 'flex';
        
        // 呼叫 Google 帳號選擇器
        google.accounts.id.initialize({
            client_id: CLIENT_ID,
            callback: handleCredentialResponse
        });
        google.accounts.id.prompt(); 
    }

    async function handleCredentialResponse(response) {
        const payload = parseJwt(response.credential);
        const userEmail = payload.email;
        
        document.getElementById('status-text').innerText = `驗證身分中：${userEmail}...`;

        // 呼叫 GAS 後端
        try {
            const res = await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify({
                    unit: selectedUnit,
                    email: userEmail
                })
            });
            const data = await res.json();

            if (data.success) {
                document.getElementById('status-text').innerText = "驗證成功，正在跳轉...";
                window.location.href = data.url;
            } else {
                alert(data.message);
                document.getElementById('login-overlay').style.display = 'none';
            }
        } catch (e) {
            alert("連線後端出錯，請稍後再試。");
            document.getElementById('login-overlay').style.display = 'none';
        }
    }

    function parseJwt(token) {
        var base64Url = token.split('.')[1];
        var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
        var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
            return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
        }).join(''));
        return JSON.parse(jsonPayload);
    }
</script>

</body>
</html>
