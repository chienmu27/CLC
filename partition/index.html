<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>115年度全國語文競賽－臺東縣分區賽</title>
    <style>
        body { font-family: "Microsoft JhengHei", Arial, sans-serif; background-color: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 500px; width: 100%; text-align: center; }
        h1 { color: #2c3e50; font-size: 24px; margin-bottom: 25px; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { 
            padding: 15px; font-size: 16px; cursor: pointer; border: none; border-radius: 8px;
            background-color: #3498db; color: white; transition: background 0.3s;
        }
        button:hover { background-color: #2980b9; }
        .footer { margin-top: 20px; font-size: 12px; color: #7f8c8d; }
    </style>
</head>
<body>

    <div class="container">
        <h1>115年度全國語文競賽－臺東縣分區賽</h1>
        <p>請選擇所屬單位進行登入：</p>
        
        <div class="btn-grid">
            <button onclick="loginTo('三和國小')">三和國小</button>
            <button onclick="loginTo('大坡國小')">大坡國小</button>
            <button onclick="loginTo('成功國小')">成功國小</button>
            <button onclick="loginTo('尚武國小')">尚武國小</button>
            <button onclick="loginTo('岩灣國小')')">岩灣國小</button>
            <button onclick="loginTo('朗島國小')">朗島國小</button>
            <button onclick="loginTo('鹿野國小')">鹿野國小</button>
            <button onclick="loginTo('綠島國小')">綠島國小</button>
            <button onclick="loginTo('豐年國小')">豐年國小</button>
        </div>

        <div class="footer">
            使用 Google 帳號自動驗證身份
        </div>
    </div>

    <script>
        // 請將下方的 URL 替換成您在 GAS 部署後得到的「網頁應用程式網址」
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxkjmHEZ7lI_BXX8p36RKegaUkzWPEjVyMaSl-X-EBhrHeUdf3_KD43F8QMm0DvJBF3AA/exec";

        function loginTo(unitName) {
            // 直接跳轉到 GAS，由 GAS 處理 Google 帳號驗證
            const authUrl = `${GAS_WEB_APP_URL}?unit=${encodeURIComponent(unitName)}`;
            window.location.href = authUrl;
        }
    </script>

</body>
</html>
