<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>115年度全國語文競賽－臺東縣分區賽</title>
    <script src="https://js.puter.com/v2/"></script>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; }
        h1 { color: #2c3e50; font-size: 1.4rem; margin-bottom: 25px; line-height: 1.5; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        button { 
            padding: 15px 10px; border: none; border-radius: 6px; 
            background-color: #3498db; color: white; font-size: 1rem; 
            cursor: pointer; transition: 0.2s;
        }
        button:hover { background-color: #2980b9; }
        button:active { transform: scale(0.98); }
        .user-tag { margin-top: 20px; font-size: 0.85rem; color: #7f8c8d; border-top: 1px solid #eee; padding-top: 15px; }
        .logout { color: #e74c3c; cursor: pointer; text-decoration: underline; margin-left: 10px; }
        #loader { display: none; margin-top: 15px; color: #3498db; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h1>115年度全國語文競賽<br>臺東縣分區賽成績系統</h1>
    
    <div class="grid">
        <button onclick="checkAccess('三和國小')">三和國小</button>
        <button onclick="checkAccess('大坡國小')">大坡國小</button>
        <button onclick="checkAccess('成功國小')">成功國小</button>
        <button onclick="checkAccess('尚武國小')">尚武國小</button>
        <button onclick="checkAccess('岩灣國小')">岩灣國小</button>
        <button onclick="checkAccess('朗島國小')">朗島國小</button>
        <button onclick="checkAccess('鹿野國小')">鹿野國小</button>
        <button onclick="checkAccess('綠島國小')">綠島國小</button>
        <button onclick="checkAccess('豐年國小')">豐年國小</button>
    </div>

    <div id="loader">連線驗證中...</div>

    <div id="statusArea" class="user-tag" style="display:none;">
        <span id="userEmail"></span>
        <span class="logout" onclick="logout()">登出</span>
    </div>
</div>

<script>
    // 請替換成您部署後的網址
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxkjmHEZ7lI_BXX8p36RKegaUkzWPEjVyMaSl-X-EBhrHeUdf3_KD43F8QMm0DvJBF3AA/exec";

    async function checkAccess(unit) {
        // 1. 檢查 Puter 登入狀態
        if (!puter.auth.isSignedIn()) {
            await puter.auth.signIn();
        }

        const user = await puter.auth.getUser();
        showUser(user.email);
        
        const loader = document.getElementById('loader');
        loader.style.display = "block";

        try {
            // 2. 傳送至 GAS 驗證
            const response = await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify({
                    email: user.email,
                    unit: unit
                })
            });

            const result = await response.json();

            if (result.status === "success") {
                window.open(result.url, '_blank');
            } else {
                alert(result.message);
            }
        } catch (e) {
            alert("系統連線失敗，請稍後再試。");
            console.error(e);
        } finally {
            loader.style.display = "none";
        }
    }

    function showUser(email) {
        document.getElementById('statusArea').style.display = "block";
        document.getElementById('userEmail').innerText = "登入中: " + email;
    }

    function logout() {
        puter.auth.signOut();
        location.reload();
    }

    // 初始化頁面
    puter.ui.onReady(async () => {
        if (puter.auth.isSignedIn()) {
            const user = await puter.auth.getUser();
            showUser(user.email);
        }
    });
</script>

</body>
</html>
