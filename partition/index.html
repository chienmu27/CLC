<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>115年度全國語文競賽－臺東縣分區賽</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        h1 { color: #2c3e50; margin-bottom: 30px; }
        .container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; max-width: 800px; }
        button { padding: 15px 25px; font-size: 16px; cursor: pointer; background-color: #3498db; color: white; border: none; border-radius: 5px; transition: 0.3s; }
        button:hover { background-color: #2980b9; }
        #user-info { margin-bottom: 20px; font-weight: bold; color: #e67e22; }
        .loading { display: none; color: #7f8c8d; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>115年度全國語文競賽－臺東縣分區賽</h1>

    <div id="g_id_onload"
         data-client_id="YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com"
         data-callback="handleCredentialResponse">
    </div>
    <div class="g_id_signin" data-type="standard"></div>

    <div id="user-info">請先登入 Google 帳號以啟用功能</div>

    <div class="container" id="unit-buttons" style="display:none;">
        <!-- 9個單位按鈕 -->
        <button onclick="checkAccess('三和國小')">三和國小</button>
        <button onclick="checkAccess('大坡國小')">大坡國小</button>
        <button onclick="checkAccess('成功國小')">成功國小</button>
        <button onclick="checkAccess('尚武國小')">尚武國小</button>
        <button onclick="checkAccess('岩灣國小')">岩灣國小</button>
        <button onclick="checkAccess('朗島國小')">朗島國小</button>
        <button onclick="checkAccess('鹿野國小')">鹿野國小</button>
        <button onclick="checkAccess('綠島國小')">綠島國小</button>
        <button onclick="checkAccess('豐年國小')">豐年國小</button>
    </div>

    <p id="status-msg" class="loading">驗證權限中，請稍候...</p>

    <script>
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxkjmHEZ7lI_BXX8p36RKegaUkzWPEjVyMaSl-X-EBhrHeUdf3_KD43F8QMm0DvJBF3AA/exec";
        let userEmail = "";

        // 解碼 JWT 取得 Email
        function decodeJwtResponse(token) {
            let base64Url = token.split('.')[1];
            let base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            let jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            return JSON.parse(jsonPayload);
        }

        function handleCredentialResponse(response) {
            const responsePayload = decodeJwtResponse(response.credential);
            userEmail = responsePayload.email;
            document.getElementById("user-info").innerText = "目前登入： " + userEmail;
            document.getElementById("unit-buttons").style.display = "grid";
            console.log("登入成功: " + userEmail);
        }

        function checkAccess(unitName) {
            if (!userEmail) {
                alert("請先完成 Google 登入");
                return;
            }

            document.getElementById("status-msg").style.display = "block";

            fetch(GAS_WEB_APP_URL, {
                method: "POST",
                body: JSON.stringify({
                    email: userEmail,
                    unit: unitName
                })
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById("status-msg").style.display = "none";
                if (data.success) {
                    window.open(data.url, '_blank');
                } else {
                    alert(data.message);
                }
            })
            .catch(err => {
                document.getElementById("status-msg").style.display = "none";
                console.error(err);
                alert("連線後端發生錯誤");
            });
        }
    </script>
</body>
</html>
