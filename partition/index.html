<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>115年度全國語文競賽－臺東縣分區賽</title>
    <!-- 引入 Puter.js -->
    <script src="https://js.puter.com/v2/"></script>
    <style>
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 500px;
            text-align: center;
        }
        h1 {
            color: #2c3e50;
            font-size: 1.5rem;
            margin-bottom: 25px;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }
        .unit-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .unit-btn {
            padding: 15px 10px;
            background-color: #ffffff;
            border: 2px solid #3498db;
            color: #3498db;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: all 0.3s;
        }
        .unit-btn:hover {
            background-color: #3498db;
            color: white;
            transform: translateY(-2px);
        }
        /* 管理員特殊色 */
        .admin-btn {
            grid-column: span 2;
            background-color: #e67e22;
            border-color: #e67e22;
            color: white;
            margin-top: 10px;
        }
        .admin-btn:hover {
            background-color: #d35400;
        }
        #status-msg {
            margin-top: 20px;
            color: #e74c3c;
            font-weight: bold;
            min-height: 1.2em;
        }
        .loading-overlay {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(255,255,255,0.8);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
    </style>
</head>
<body>

<div id="loading" class="loading-overlay">
    <div>驗證中，請稍候...</div>
</div>

<div class="container">
    <h1>115年度全國語文競賽－臺東縣分區賽</h1>
    <div class="unit-grid">
        <!-- 9 個單位按鈕 -->
        <button class="unit-btn" onclick="handleLogin('三和國小')">三和國小</button>
        <button class="unit-btn" onclick="handleLogin('大坡國小')">大坡國小</button>
        <button class="unit-btn" onclick="handleLogin('成功國小')">成功國小</button>
        <button class="unit-btn" onclick="handleLogin('尚武國小')">尚武國小</button>
        <button class="unit-btn" onclick="handleLogin('岩灣國小')">岩灣國小</button>
        <button class="unit-btn" onclick="handleLogin('朗島國小')">朗島國小</button>
        <button class="unit-btn" onclick="handleLogin('鹿野國小')">鹿野國小</button>
        <button class="unit-btn" onclick="handleLogin('綠島國小')">綠島國小</button>
        <button class="unit-btn" onclick="handleLogin('豐年國小')">豐年國小</button>
    </div>
    
    <div id="status-msg"></div>
    
    <div style="margin-top: 30px; font-size: 0.8rem; color: #7f8c8d;">
        請點選所屬單位並使用 Google 帳號登入驗證
    </div>
</div>

<script>
    // 請將此處替換為您部署完 GAS 後取得的 Web App 網址
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbxkjmHEZ7lI_BXX8p36RKegaUkzWPEjVyMaSl-X-EBhrHeUdf3_KD43F8QMm0DvJBF3AA/exec"; 

    async function handleLogin(unitName) {
        const msgDiv = document.getElementById('status-msg');
        const loading = document.getElementById('loading');
        msgDiv.innerText = "";

        try {
            // 1. 使用 Puter.js 呼叫 Google 登入視窗
            if (!puter.auth.isSignedIn()) {
                await puter.auth.signIn();
            }
            
            const user = await puter.auth.getUser();
            const email = user.email;

            loading.style.display = "flex";

            // 2. 向 GAS 發送驗證請求
            const response = await fetch(GAS_API_URL, {
                method: 'POST',
                body: JSON.stringify({
                    email: email,
                    targetUnit: unitName
                })
            });

            const result = await response.json();

            if (result.status === "success") {
                msgDiv.style.color = "green";
                msgDiv.innerText = "驗證成功！正在開啟試算表...";
                // 3. 開啟對應的試算表網址
                window.open(result.url, '_blank');
            } else {
                msgDiv.style.color = "red";
                msgDiv.innerText = result.message;
            }

        } catch (error) {
            console.error(error);
            msgDiv.style.color = "red";
            msgDiv.innerText = "登入或驗證過程出錯，請重試。";
        } finally {
            loading.style.display = "none";
        }
    }
</script>

</body>
</html>
