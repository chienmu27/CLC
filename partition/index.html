<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>115年度全國語文競賽－臺東縣分區賽</title>
    <script src="https://js.puter.com/v2/"></script>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #f0f4f8; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: white; padding: 2rem; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 90%; max-width: 480px; text-align: center; }
        
        .status-header { 
            background: #f1f5f9; border-radius: 8px; padding: 12px; margin-bottom: 25px; 
            font-size: 0.85rem; color: #475569; display: flex; justify-content: space-between; align-items: center;
            border: 1px solid #e2e8f0;
        }
        .btn-switch { background: #64748b; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 0.75rem; font-weight: bold; }
        .btn-switch:hover { background: #334155; }

        h1 { color: #1e293b; font-size: 1.4rem; margin: 0 0 20px 0; border-bottom: 3px solid #3b82f6; padding-bottom: 12px; line-height: 1.4; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .school-btn { 
            padding: 18px 5px; border: none; border-radius: 8px; 
            background-color: #3b82f6; color: white; font-size: 1rem; 
            cursor: pointer; transition: 0.2s; font-weight: bold;
        }
        .school-btn:hover { background-color: #2563eb; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }
        .school-btn:active { transform: scale(0.96); }

        #loading { display: none; margin: 15px 0; color: #3b82f6; font-weight: bold; font-size: 0.9rem; }
        .footer { margin-top: 25px; font-size: 0.75rem; color: #64748b; background: #fffbeb; padding: 10px; border-radius: 6px; border: 1px solid #fde68a; }
    </style>
</head>
<body>

<div class="container">
    <!-- 帳號狀態面板 -->
    <div id="authPanel" class="status-header" style="display:none;">
        <span id="userEmail">檢查帳號中...</span>
        <button class="btn-switch" onclick="switchAccount()">切換帳號</button>
    </div>

    <h1>115年度全國語文競賽<br>臺東縣分區賽成績系統</h1>
    
    <div id="loading">🚀 正在連線驗證，請稍候...</div>

    <div class="grid">
        <button class="school-btn" onclick="openLink('三和國小')">三和國小</button>
        <button class="school-btn" onclick="openLink('大坡國小')">大坡國小</button>
        <button class="school-btn" onclick="openLink('成功國小')">成功國小</button>
        <button class="school-btn" onclick="openLink('尚武國小')">尚武國小</button>
        <button class="school-btn" onclick="openLink('岩灣國小')">岩灣國小</button>
        <button class="school-btn" onclick="openLink('朗島國小')">朗島國小</button>
        <button class="school-btn" onclick="openLink('鹿野國小')">鹿野國小</button>
        <button class="school-btn" onclick="openLink('綠島國小')">綠島國小</button>
        <button class="school-btn" onclick="openLink('豐年國小')">豐年國小</button>
    </div>

    <div id="hintBox" class="footer" style="display:none;">
        ⚠️ <b>注意：</b>若無法開啟，請點擊「切換帳號」，並在 Google 授權視窗中<b>務必勾選</b>「查看您的主要電子郵件地址」。
    </div>
</div>

<script>
    // ！！！請將下方網址改為您部署後的最新 GAS 網址 ！！！
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxkjmHEZ7lI_BXX8p36RKegaUkzWPEjVyMaSl-X-EBhrHeUdf3_KD43F8QMm0DvJBF3AA/exec";

    /**
     * 主要開啟邏輯
     */
    async function openLink(unitName) {
        setLoading(true);
        try {
            // 1. 如果沒登入，跳出登入視窗
            if (!puter.auth.isSignedIn()) {
                await puter.auth.signIn();
            }

            let user = await puter.auth.getUser();

            // 2. 解決 Email 缺失的核心機制
            // 如果 user 存在但 email 為空，代表授權不全或緩存損壞，強制登出重來
            if (!user || !user.email) {
                console.warn("Email 授權缺失，強制重置狀態...");
                await puter.auth.signOut();
                alert("為了安全性與權限驗證，請重新登入 Google 並勾選「提供電子郵件地址」授權。");
                await puter.auth.signIn();
                user = await puter.auth.getUser();
            }

            // 最終防護：如果還是拿不到 Email
            if (!user || !user.email) {
                document.getElementById('hintBox').style.display = "block";
                alert("錯誤：系統無法獲取您的 Email。\n請點擊上方「切換帳號」按鈕重試。");
                setLoading(false);
                return;
            }

            updateAuthUI(user.email);

            // 3. 向後端發送請求
            const response = await fetch(GAS_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ email: user.email, unit: unitName })
            });

            const result = await response.json();

            if (result.status === "success") {
                window.open(result.url, '_blank');
            } else {
                alert(result.message);
            }

        } catch (err) {
            console.error(err);
            alert("伺服器連線失敗，請檢查網路或重新整理頁面。");
        } finally {
            setLoading(false);
        }
    }

    /**
     * 切換帳號功能：徹底登出並刷新頁面
     */
    async function switchAccount() {
        if (confirm("確定要登出並選擇其他 Google 帳號嗎？")) {
            await puter.auth.signOut();
            location.reload(); 
        }
    }

    function updateAuthUI(email) {
        document.getElementById('authPanel').style.display = "flex";
        document.getElementById('userEmail').innerText = "帳號: " + email;
        document.getElementById('hintBox').style.display = "none";
    }

    function setLoading(show) {
        document.getElementById('loading').style.display = show ? "block" : "none";
    }

    // 啟動自動偵測
    puter.ui.onReady(async () => {
        if (puter.auth.isSignedIn()) {
            const user = await puter.auth.getUser();
            if (user && user.email) {
                updateAuthUI(user.email);
            } else {
                // 如果登入了卻沒 email，代表快取有問題，隱藏 UI
                document.getElementById('authPanel').style.display = "none";
            }
        }
    });
</script>

</body>
</html>
