<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>115年度全國語文競賽－臺東縣分區賽</title>
    <script src="https://js.puter.com/v2/"></script>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #f0f2f5; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: white; padding: 2rem; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 90%; max-width: 500px; text-align: center; }
        
        /* 狀態列 */
        .auth-bar { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 12px; margin-bottom: 25px; font-size: 0.85rem; display: flex; flex-direction: column; gap: 8px; }
        .btn-reset { background: #ef4444; color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        h1 { color: #1e293b; font-size: 1.4rem; margin: 0 0 20px 0; border-bottom: 4px solid #3b82f6; padding-bottom: 12px; }
        
        /* 按鈕網格 */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .school-btn { 
            padding: 20px 5px; border: none; border-radius: 10px; 
            background-color: #3b82f6; color: white; font-size: 1.05rem; 
            cursor: pointer; transition: 0.2s; font-weight: bold;
        }
        .school-btn:hover { background-color: #2563eb; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(59, 130, 246, 0.3); }
        .school-btn:active { transform: scale(0.95); }

        #msg { margin-top: 15px; font-weight: bold; display: none; padding: 10px; border-radius: 8px; }
        .loading { color: #2563eb; background: #dbeafe; display: block !important; }
        .error { color: #b91c1c; background: #fee2e2; display: block !important; }

        .hint { margin-top: 25px; font-size: 0.8rem; color: #64748b; background: #fffbeb; padding: 10px; border-radius: 8px; border: 1px solid #fde68a; }
    </style>
</head>
<body>

<div class="container">
    <div id="authPanel" class="auth-bar" style="display:none;">
        <span>目前帳號：<b id="userEmail">讀取中...</b></span>
        <button class="btn-reset" onclick="hardLogout()">清除緩存並重新登入</button>
    </div>

    <h1>115年度全國語文競賽<br>臺東縣分區賽成績系統</h1>
    
    <div id="msg"></div>

    <div class="grid">
        <button class="school-btn" onclick="openSpreadsheet('三和國小')">三和國小</button>
        <button class="school-btn" onclick="openSpreadsheet('大坡國小')">大坡國小</button>
        <button class="school-btn" onclick="openSpreadsheet('成功國小')">成功國小</button>
        <button class="school-btn" onclick="openSpreadsheet('尚武國小')">尚武國小</button>
        <button class="school-btn" onclick="openSpreadsheet('岩灣國小')">岩灣國小</button>
        <button class="school-btn" onclick="openSpreadsheet('朗島國小')">朗島國小</button>
        <button class="school-btn" onclick="openSpreadsheet('鹿野國小')">鹿野國小</button>
        <button class="school-btn" onclick="openSpreadsheet('綠島國小')">綠島國小</button>
        <button class="school-btn" onclick="openSpreadsheet('豐年國小')">豐年國小</button>
    </div>

    <div class="hint">
        💡 <b>重要提示：</b><br>
        點擊後請在 Google 視窗務必勾選「查看您的主要電子郵件地址」，否則無法驗證權限。
    </div>
</div>

<script>
    // ！！！ 請替換為您部署後的 GAS 網址 ！！！
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxkjmHEZ7lI_BXX8p36RKegaUkzWPEjVyMaSl-X-EBhrHeUdf3_KD43F8QMm0DvJBF3AA/exec";

    async function openSpreadsheet(unit) {
        const msg = document.getElementById('msg');
        msg.innerText = "驗證權限中...";
        msg.className = "loading";

        try {
            if (!puter.auth.isSignedIn()) {
                await puter.auth.signIn();
            }

            let user = await puter.auth.getUser();

            // 強制重整機制：如果拿不到 Email
            if (!user || !user.email) {
                await puter.auth.signOut();
                alert("權限讀取失敗，請重新登入並勾選『提供電子郵件地址』。");
                await puter.auth.signIn();
                user = await puter.auth.getUser();
            }

            if (!user || !user.email) {
                msg.innerText = "授權失敗，無法獲取 Email。";
                msg.className = "error";
                return;
            }

            updateUI(user.email);

            // 呼叫後端獲取對應連結
            const response = await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify({ email: user.email, unit: unit })
            });

            const result = await response.json();

            if (result.status === "success") {
                msg.style.display = "none";
                window.open(result.url, '_blank');
            } else {
                msg.innerText = result.message;
                msg.className = "error";
            }

        } catch (e) {
            msg.innerText = "網路連線異常。";
            msg.className = "error";
        }
    }

    function hardLogout() {
        puter.auth.signOut();
        location.reload();
    }

    function updateUI(email) {
        document.getElementById('authPanel').style.display = "flex";
        document.getElementById('userEmail').innerText = email;
    }

    puter.ui.onReady(async () => {
        if (puter.auth.isSignedIn()) {
            const user = await puter.auth.getUser();
            if (user && user.email) updateUI(user.email);
        }
    });
</script>

</body>
</html>
