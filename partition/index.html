<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>115年度全國語文競賽－臺東縣分區賽</title>
    <script src="https://js.puter.com/v2/"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --danger: #e74c3c; }
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #f4f7f6; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); width: 90%; max-width: 550px; text-align: center; border-top: 5px solid var(--accent); }
        h1 { color: var(--primary); font-size: 1.3rem; margin-top: 0; margin-bottom: 25px; }
        
        .user-status { background: #f8f9fa; padding: 12px; border-radius: 8px; font-size: 0.9rem; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #ddd; }
        .logout-btn { background: var(--danger); color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; font-weight: bold; }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .btn-school { padding: 18px 5px; background: #fff; border: 1px solid var(--accent); color: var(--accent); border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 0.9rem; }
        .btn-school:hover { background: var(--accent); color: white; box-shadow: 0 4px 10px rgba(52, 152, 219, 0.3); }

        #msg { margin-top: 20px; padding: 15px; border-radius: 6px; min-height: 20px; font-weight: bold; font-size: 0.9rem; white-space: pre-wrap; }
        .error { color: var(--danger); background: #fff5f5; border: 1px solid var(--danger); }
        .success { color: #27ae60; background: #f2faf5; border: 1px solid #27ae60; }

        .loading-mask { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; color: white; }
        .spinner { border: 4px solid rgba(255,255,255,0.3); border-top: 4px solid white; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loading" class="loading-mask">
    <div class="spinner"></div>
    <div style="font-size: 1.1rem;">正在呼叫 Google 驗證...</div>
</div>

<div class="card">
    <h1>115年度全國語文競賽－臺東縣分區賽</h1>

    <div class="user-status">
        <span id="userInfo">點選下方單位開始驗證</span>
        <button class="logout-btn" onclick="forceLogout()">登出</button>
    </div>

    <div class="grid">
        <button class="btn-school" onclick="handleAuthFlow('三和國小')">三和國小</button>
        <button class="btn-school" onclick="handleAuthFlow('大坡國小')">大坡國小</button>
        <button class="btn-school" onclick="handleAuthFlow('成功國小')">成功國小</button>
        <button class="btn-school" onclick="handleAuthFlow('尚武國小')">尚武國小</button>
        <button class="btn-school" onclick="handleAuthFlow('岩灣國小')">岩灣國小</button>
        <button class="btn-school" onclick="handleAuthFlow('朗島國小')">朗島國小</button>
        <button class="btn-school" onclick="handleAuthFlow('鹿野國小')">鹿野國小</button>
        <button class="btn-school" onclick="handleAuthFlow('綠島國小')">綠島國小</button>
        <button class="btn-school" onclick="handleAuthFlow('豐年國小')">豐年國小</button>
    </div>

    <div id="msg"></div>
</div>

<script>
    // ⚠️ 請務必將下方替換為您 GAS 部署後產生的「網頁應用程式網址」
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxkjmHEZ7lI_BXX8p36RKegaUkzWPEjVyMaSl-X-EBhrHeUdf3_KD43F8QMm0DvJBF3AA/exec"; 

    async function updateStatus() {
        try {
            if (puter.auth.isSignedIn()) {
                const user = await puter.auth.getUser();
                document.getElementById('userInfo').innerText = "目前帳號: " + user.email;
            } else {
                document.getElementById('userInfo').innerText = "點選下方單位開始驗證";
            }
        } catch (e) {}
    }

    async function forceLogout() {
        await puter.auth.signOut();
        updateStatus();
        showMsg("帳號已登出", "success");
    }

    async function handleAuthFlow(schoolName) {
        const msgBox = document.getElementById('msg');
        const loading = document.getElementById('loading');
        
        msgBox.className = "";
        msgBox.innerText = "";
        loading.style.display = "flex";

        try {
            // 每次點擊都強制登出再登入，以顯示帳號選擇器
            await puter.auth.signOut();
            
            // 1. 啟動 Puter 登入視窗
            const user = await puter.auth.signIn();
            
            if (!user || !user.email) {
                throw new Error("使用者取消登入或未選擇帳號");
            }

            updateStatus();
            showMsg("驗證伺服器溝通中...", "success");

            // 2. 呼叫 GAS 後端
            const resp = await fetch(GAS_URL, {
                method: 'POST',
                mode: 'cors', // 明確指定 CORS
                body: JSON.stringify({
                    email: user.email,
                    targetUnit: schoolName
                })
            });

            if (!resp.ok) {
                throw new Error("無法連接到 GAS 伺服器，請檢查網址是否正確。");
            }

            const result = await resp.json();

            if (result.status === "success") {
                showMsg("驗證通過！正在開啟試算表...", "success");
                window.open(result.url, '_blank');
            } else {
                showMsg(result.message, "error");
            }

        } catch (err) {
            console.error(err);
            // 顯示更詳細的錯誤資訊
            showMsg("發生錯誤：\n" + err.message, "error");
        } finally {
            loading.style.display = "none";
        }
    }

    function showMsg(text, type) {
        const msgBox = document.getElementById('msg');
        msgBox.innerText = text;
        msgBox.className = type;
    }

    updateStatus();
</script>

</body>
</html>
