<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>115年度全國語文競賽－臺東縣分區賽</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        h1 { color: #2c3e50; margin-bottom: 30px; }
        .container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; max-width: 800px; }
        @media (max-width: 600px) { .container { grid-template-columns: repeat(1, 1fr); } }
        button {
            padding: 15px 25px;
            font-size: 18px;
            cursor: pointer;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            transition: background 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button:hover { background-color: #2980b9; }
        button:disabled { background-color: #95a5a6; cursor: not-allowed; }
        #msg { margin-top: 20px; color: #e74c3c; font-weight: bold; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 2s linear infinite; display: none; margin-top: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <h1>115年度全國語文競賽－臺東縣分區賽</h1>
    
    <div class="container" id="buttonGroup">
        <!-- 9個單位按鈕 -->
        <button onclick="openSheet('三和國小')">三和國小</button>
        <button onclick="openSheet('大坡國小')">大坡國小</button>
        <button onclick="openSheet('成功國小')">成功國小</button>
        <button onclick="openSheet('尚武國小')">尚武國小</button>
        <button onclick="openSheet('岩灣國小')">岩灣國小</button>
        <button onclick="openSheet('朗島國小')">朗島國小</button>
        <button onclick="openSheet('鹿野國小')">鹿野國小</button>
        <button onclick="openSheet('綠島國小')')">綠島國小</button>
        <button onclick="openSheet('豐年國小')">豐年國小</button>
    </div>

    <div class="loader" id="loader"></div>
    <p id="msg"></p>

    <script>
        // 請在此處貼上你從 GAS 部署後獲得的「網頁應用程式 URL」
        const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxkjmHEZ7lI_BXX8p36RKegaUkzWPEjVyMaSl-X-EBhrHeUdf3_KD43F8QMm0DvJBF3AA/exec';

        function openSheet(unitName) {
            const msgEl = document.getElementById('msg');
            const loader = document.getElementById('loader');
            msgEl.innerText = "驗證中，請稍候...";
            loader.style.display = "block";

            // 呼叫 GAS API
            const apiUrl = `${GAS_WEB_APP_URL}?unit=${encodeURIComponent(unitName)}`;

            // 注意：因為 GAS 設定為「執行身分：存取使用者」，
            // 瀏覽器會引導使用者進行 Google 登入驗證
            window.location.href = apiUrl; 
            
            /* 
               備註：
               直接跳轉至 GAS URL 是最簡單的做法，GAS 會處理登入流程。
               如果使用者已登入且有權限，GAS 會執行 doGet 並根據邏輯回傳 JSON。
               若要更美觀，建議 GAS 直接在後端做 Response.redirect(url)。
            */
        }
    </script>
</body>
</html>
